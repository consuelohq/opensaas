enableConstraintsChecks: true

enableHardenedMode: true

enableInlineHunks: true

nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.9.2.cjs

# DEV-793: @nestjs/serve-static@5 requires express@5, but Twenty uses express@4
# The serve-static module's actual usage is minimal (basic static file serving),
# and the breaking changes in express 5 (path matching, middleware signatures)
# don't affect this use case. Suppress the peer dependency warning.
packageExtensions:
  '@nestjs/serve-static@5.0.4':
    peerDependencies:
      express: '^4.18.1 || ^5.0.1'
