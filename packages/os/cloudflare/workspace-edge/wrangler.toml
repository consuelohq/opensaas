name = "consuelo-workspace-edge"
main = "src/index.ts"
compatibility_date = "2026-06-11"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "internal.consuelohq.com/*"
zone_name = "consuelohq.com"
[[routes]]
pattern = "*.consuelohq.com/*"
zone_name = "consuelohq.com"
[[d1_databases]]
binding = "WORKSPACE_ROUTE_REGISTRY"
database_name = "consuelo-workspace-route-registry"
database_id = "2e16a374-cf0d-463e-b696-b24b8c8599bd"
migrations_dir = "migrations"
[[r2_buckets]]
binding = "SITES_SNAPSHOTS"
bucket_name = "consuelo-sites-snapshots"

[[kv_namespaces]]
binding = "MCP_CONNECTION_CREDENTIALS"
id = "6041f26f85af46ee926e6c4d516a5b85"
[[kv_namespaces]]
binding = "MCP_CONNECTION_STATES"
id = "416cff400d584d56bffc14503684ed09"
[[kv_namespaces]]
binding = "MCP_APPROVED_CONNECTOR_BINDINGS"
id = "a10b564e40dd4e43a4560132650cb335"
