name = "consuelo-os-device-authority"
main = "src/index.ts"
compatibility_date = "2026-06-11"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "os.consuelohq.com/*", zone_name = "consuelohq.com" }
]

[vars]
OS_DEVICE_AUTH_ORIGIN = "https://os.consuelohq.com"

[[durable_objects.bindings]]
name = "DEVICE_GRANTS"
class_name = "OsDeviceGrantDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OsDeviceGrantDurableObject"]

[[d1_databases]]
binding = "WORKSPACE_ROUTE_REGISTRY"
database_name = "consuelo-workspace-route-registry"
database_id = "2e16a374-cf0d-463e-b696-b24b8c8599bd"
migrations_dir = "../workspace-edge/migrations"

[[r2_buckets]]
binding = "SITES_SNAPSHOTS"
bucket_name = "consuelo-sites-snapshots"
