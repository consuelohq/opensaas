# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  review_status: false
  collapse_walkthrough: false
  poem: false
  in_progress_fortune: false
  assess_linked_issues: true
  sequence_diagrams: false
  enable_prompt_for_ai_agents: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - staging

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/*.lock"
    - "!**/yarn.lock"

  path_instructions:
    - path: "packages/**/*.ts"
      instructions: |
        enforce these 13 coding standards (from scripts/code-review.sh):
        1. no console.log/error/warn — use structured logger
        2. HTTP errors and caught exceptions must have sentry tracking
        3. phone comparisons must use normalizePhone()
        4. no SQL template literals in .query() calls
        5. async functions with await must have try/catch within 30 lines
        6. no 'any' type without // HACK: comment
        7. no hardcoded secrets (skip process.env and type annotations)
        8. bare TODO/FIXME must have ticket ref like DEV-123
        9. no wildcard imports except builtins (fs, path, os) and Sentry
        10. param routes (:id) must come AFTER literal routes in same prefix
        11. catch blocks must use (err: unknown), never (err: any)
        12. peerDependencies must use lazy await import(), never top-level import
        13. stub handlers must return 501 or have // STUB: comment
    - path: "packages/twenty-front/**/*.tsx"
      instructions: |
        - functional components only, named exports only
        - use Emotion styled-components for styling
        - use createState from @/ui/utilities/state/utils/createState for recoil atoms
        - keyboard shortcuts must use useGlobalHotkeys hook, never raw addEventListener
        - no abbreviations in variable names (user not u, fieldMetadata not fm)
        - use Lingui for all user-facing strings
        - types over interfaces, string literals over enums
    - path: ".agent/**"
      instructions: "infrastructure/pipeline scripts — review for correctness but skip typescript coding standards"

chat:
  auto_reply: true
  integrations:
    linear:
      usage: "enabled"

knowledge_base:
  web_search:
    enabled: true
  learnings:
    scope: "global"
  code_guidelines:
    enabled: true
  issues:
    scope: "global"
  linear:
    usage: "enabled"
    team_keys:
      - "DEV"
  pull_requests:
    scope: "global"
